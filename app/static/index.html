<!-- app/static/index.html -->
<!-- ------------------------------------------------------------ -->
<!-- FastAPI가 제공하는 챗봇 화면입니다. -->
<!-- 제공된 React 예제의 floating chatbot UI를 순수 HTML/CSS/JS 구조로 다시 구현했습니다. -->
<!-- ------------------------------------------------------------ -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 브라우저가 한글을 정상 표시하도록 UTF-8 문자셋을 지정합니다. -->
    <meta charset="UTF-8" />

    <!-- 모바일 화면에서도 레이아웃이 화면 너비에 맞게 표시되도록 설정합니다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 브라우저 탭에 표시될 제목입니다. -->
    <title>FastAPI ChatGPT ChatBot</title>

    <!-- 별도로 작성한 CSS 파일을 연결합니다. -->
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <!-- 전체 페이지의 메인 영역입니다. -->
    <main class="page">
        <!-- 프로젝트 제목과 설명을 표시하는 영역입니다. -->
        <section class="hero">
            <h1>FastAPI ChatGPT 챗봇 앱</h1>
            <p>오른쪽 아래 챗봇 버튼을 눌러 질문을 입력하세요.</p>
            <p class="notice">API 키가 없으면 데모 모드로 동작하고, API 키를 설정하면 실제 ChatGPT 응답을 받습니다.</p>
        </section>
    </main>

    <!-- 오른쪽 아래에 고정되는 챗봇 열기 버튼입니다. -->
    <button id="chatIcon" class="chat-icon" type="button" aria-label="챗봇 열기">
        💬
    </button>

    <!-- 챗봇 모달 창 전체를 감싸는 영역입니다. hidden 클래스가 있으면 보이지 않습니다. -->
    <section id="chatModal" class="chat-modal hidden" aria-label="챗봇 대화창">
        <!-- 챗봇 모달의 상단 제목 영역입니다. -->
        <header class="chat-header">
            <strong>ChatGPT ChatBot</strong>
            <div class="header-actions">
                <button id="toggleSettings" class="settings-button" type="button" aria-label="설정 열기/닫기" title="설정">⚙️</button>
                <button id="clearHistory" class="clear-button" type="button" aria-label="대화 초기화" title="대화 초기화">🗑️</button>
                <button id="closeChat" class="close-button" type="button" aria-label="챗봇 닫기">×</button>
            </div>
        </header>

        <!-- 설정 패널입니다. 기본값은 숨김 상태입니다. -->
        <div id="settingsPanel" class="settings-panel hidden">
            <label class="setting-label">
                System Instruction
                <textarea id="systemInstruction" class="setting-textarea" rows="3"
                    placeholder="챗봇 역할 지시문 (비워두면 기본값 사용)"></textarea>
            </label>
            <label class="setting-label">
                Model
                <select id="modelSelect" class="setting-select">
                    <option value="">기본값 (서버 환경 변수)</option>
                    <option value="gpt-4o-mini">gpt-4o-mini</option>
                    <option value="gpt-4o">gpt-4o</option>
                    <option value="gpt-4.1">gpt-4.1</option>
                    <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                    <option value="gpt-5">gpt-5</option>
                    <option value="o4-mini">o4-mini</option>
                    <option value="o3">o3</option>
                    <option value="o3-mini">o3-mini</option>
                </select>
            </label>
            <div class="setting-row">
                <label class="setting-label half" id="temperatureLabel">
                    Temperature
                    <input id="temperatureInput" class="setting-input" type="number"
                        min="0" max="2" step="0.1" placeholder="기본값 0.7" />
                </label>
                <label class="setting-label half">
                    Top P
                    <input id="topPInput" class="setting-input" type="number"
                        min="0" max="1" step="0.05" placeholder="기본값 없음" />
                </label>
            </div>
            <label class="setting-label">
                Max Output Tokens
                <input id="maxTokensInput" class="setting-input" type="number"
                    min="1" step="1" placeholder="기본값 없음 (모델 최대값)" />
            </label>
            <!-- o계열·gpt-5 모델 선택 시 temperature 미지원 안내 -->
            <p id="tempWarning" class="temp-warning hidden">
                ⚠️ 선택한 모델은 temperature를 지원하지 않아 자동으로 무시됩니다.
            </p>
        </div>

        <!-- 대화 메시지가 계속 추가되는 영역입니다. -->
        <div id="chatMessages" class="chat-messages"></div>

        <!-- 사용자 입력 폼입니다. Enter 또는 전송 버튼으로 메시지를 보냅니다. -->
        <form id="chatForm" class="chat-form">
            <input id="messageInput" class="chat-input" type="text" placeholder="질문을 입력하세요." autocomplete="off" />
            <button class="send-button" type="submit">전송</button>
        </form>
    </section>

    <!-- 챗봇 동작을 담당하는 JavaScript 파일을 연결합니다. -->
    <script src="/static/app.js"></script>
</body>
</html>
